name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: |
            copilot-remote-vscode/package-lock.json
            vscode-copilot-chat/package-lock.json

      - name: Build VS Code extension
        working-directory: copilot-remote-vscode
        run: |
          npm ci
          npm run compile
          npm run build
          npx --yes @vscode/vsce package --out copilot-remote.vsix

      - name: Build patched GitHub Copilot Chat
        working-directory: vscode-copilot-chat
        run: |
          node script/restoreBuildManifest.mjs
          npm ci --ignore-scripts
          npm run postinstall
          npm run build
          npx --yes @vscode/vsce package --no-dependencies --allow-package-secrets sendgrid --out copilot-chat-patched.vsix

      - name: Restore Android signing key
        working-directory: copilot-remote-android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.jks
          fi

      - name: Build Android release
        working-directory: copilot-remote-android
        env:
          COPILOT_SIGNING_STORE_FILE: ${{ github.workspace }}/copilot-remote-android/release.jks
          COPILOT_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          COPILOT_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          COPILOT_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copilot-remote-${{ github.sha }}
          if-no-files-found: error
          path: |
            copilot-remote-android/app/build/outputs/apk/release/*.apk
            copilot-remote-vscode/copilot-remote.vsix
            vscode-copilot-chat/copilot-chat-patched.vsix
